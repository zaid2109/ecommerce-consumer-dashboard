name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecodash
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecodash"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ecodash
      JWT_SECRET: ci-jwt-secret
      CONNECTOR_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      LOCAL_TEST_MODE: false
      ENABLE_SCAFFOLD_ENDPOINTS: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma db push
        run: npx prisma db push --accept-data-loss

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Integration checks
        run: npm run check:integration

      - name: Build
        run: npm run build

